<!doctype html>
<html class="bg-stone-50 text-stone-800 dark:bg-stone-950 dark:text-stone-300">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pi Super Review</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>{{STYLE}}</style>
  </head>
  <body class="min-h-screen bg-stone-50 text-sm leading-loose antialiased dark:bg-stone-950 md:text-base">
    <header class="mx-auto flex max-w-6xl items-start justify-between gap-5 px-5 pb-3 pt-8 md:pt-10 max-md:block">
      <div>
        <h1 class="font-extrabold text-stone-950 before:text-stone-500 before:content-['#_'] dark:text-stone-50">Pi Super Review</h1>
        <p class="mt-0.5 text-stone-500 dark:text-stone-400">{{MODE}} · {{TARGET}} · {{UPDATED_AT}}</p>
      </div>
      <div class="whitespace-nowrap tabular-nums text-stone-500 dark:text-stone-400 max-md:mt-3">
        <b class="font-semibold text-stone-950 dark:text-stone-50">{{FILES}}</b> files
        <b class="add font-semibold">+{{ADDITIONS}}</b>
        <b class="del font-semibold">-{{DELETIONS}}</b>
      </div>
    </header>

    <main class="mx-auto grid max-w-6xl gap-7 px-5 pb-20">
      <section class="summary max-w-prose">
        <h2 class="font-semibold text-stone-500 before:content-['##_'] dark:text-stone-400">Summary</h2>
        <div id="summary" class="prose">{{SUMMARY}}</div>
      </section>

      <section class="general-comments max-w-prose">
        <h2 class="font-semibold text-stone-500 before:content-['##_'] dark:text-stone-400">General comments</h2>
        <form id="general-comment-form">
          <textarea rows="3" placeholder="Leave a general review note…"></textarea>
          <div><button type="submit">Post comment</button></div>
        </form>
        <div id="general-comments"></div>
      </section>

      <section id="diff">{{DIFF}}</section>
    </main>

    <script type="module">{{CLIENT_SCRIPT}}</script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs"></script>
  </body>
</html>
